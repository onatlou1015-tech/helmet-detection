<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Traffic Light + Camera Sensor</title>
        <style>
    /* ----- global reset & base ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b1219;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 1.2rem;
    }

    /* ----- main split container (2 columns) ----- */
    .dashboard {
      display: flex;
      flex-wrap: wrap;
      width: 1300px;
      max-width: 100%;
      height: 700px;
      max-height: 90vh;
      background: #141f2a;
      border-radius: 3rem;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255,255,255,0.04);
      overflow: hidden;
    }

    /* ----- left column : traffic light ----- */
    .left-col {
      flex: 1 1 45%;
      min-width: 300px;
      background: linear-gradient(145deg, #1f2e3b 0%, #15222d 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.8rem 1.2rem;
      border-right: 2px solid #2d4050;
      position: relative;
    }

    /* traffic light housing */
    .traffic-wrapper {
      background: #283b4a;
      padding: 2rem 2.2rem 2.2rem 2.2rem;
      border-radius: 5rem 5rem 3rem 3rem;
      box-shadow: 
        0 20px 30px rgba(0, 0, 0, 0.7),
        inset 0 -4px 8px rgba(0,0,0,0.5),
        inset 0 4px 6px rgba(255,255,255,0.06);
      border-bottom: 6px solid #1b2a33;
      width: fit-content;
      margin: 0 auto;
    }

    .traffic-light {
      background: #1b2630;
      padding: 2rem 1.8rem 1.8rem 1.8rem;
      border-radius: 4.5rem 4.5rem 3rem 3rem;
      box-shadow: 
        inset 0 -8px 10px rgba(0,0,0,0.7),
        inset 0 8px 12px rgba(255,255,255,0.04);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      min-width: 120px;
      border-top: 2px solid #3f5567;
    }

    .light {
      width: 95px;
      height: 95px;
      border-radius: 50%;
      background: #1f2b33;
      box-shadow: 
        inset 0 -8px 6px rgba(0,0,0,0.6),
        inset 0 8px 8px rgba(255,255,255,0.08),
        0 0 0 2px #1b232b;
      transition: background 0.2s ease, box-shadow 0.25s ease;
    }

    /* active states with glow */
    .red-light { background: #4a1f1f; }
    .red-light.active { 
      background: #ff2d2d; 
      box-shadow: 
        inset 0 -6px 6px rgba(0,0,0,0.4),
        inset 0 6px 20px #ff9a9a,
        0 0 30px 12px rgba(255, 50, 50, 0.6);
    }

    .yellow-light { background: #5a4a1a; }
    .yellow-light.active { 
      background: #ffe033; 
      box-shadow: 
        inset 0 -6px 6px rgba(0,0,0,0.4),
        inset 0 6px 20px #ffefb0,
        0 0 30px 12px rgba(255, 215, 0, 0.6);
    }

    .green-light { background: #1a4a2a; }
    .green-light.active { 
      background: #2bdb5c; 
      box-shadow: 
        inset 0 -6px 6px rgba(0,0,0,0.4),
        inset 0 6px 20px #9affb0,
        0 0 30px 12px rgba(50, 255, 100, 0.6);
    }

    .pole {
      width: 18px;
      height: 65px;
      background: #333f4b;
      margin: 0 auto -8px auto;
      border-radius: 0 0 20px 20px;
      box-shadow: inset -4px 0 8px rgba(0,0,0,0.4);
      border-left: 1px solid #4e5f6b;
      border-right: 1px solid #1f2933;
    }
    .base {
      width: 70px;
      height: 12px;
      background: #2c3a44;
      margin: 0 auto;
      border-radius: 30px;
      box-shadow: inset 0 4px 6px rgba(0,0,0,0.5);
      border-bottom: 2px solid #1b242c;
    }

    /* controls */
    .controls {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      margin-top: 1.8rem;
      flex-wrap: wrap;
    }

    .btn {
      background: #334654;
      border: none;
      border-bottom: 4px solid #1c2933;
      padding: 0.6rem 1.2rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.4px;
      color: #eaf0f5;
      cursor: pointer;
      box-shadow: 0 5px 0 #141d24, 0 6px 12px rgba(0,0,0,0.3);
      transition: all 0.07s ease;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .btn:active {
      transform: translateY(5px);
      box-shadow: 0 0px 0 #141d24, 0 6px 12px rgba(0,0,0,0.3);
    }
    .btn-danger { background: #b13e3e; border-bottom-color: #712626; }
    .btn-danger:hover { background: #cf4c4c; }
    .btn-warning { background: #b88a3b; border-bottom-color: #7a5d23; }
    .btn-warning:hover { background: #d4a44a; }
    .btn-success { background: #3a8f5a; border-bottom-color: #1f5a37; }
    .btn-success:hover { background: #49ae6e; }
    .btn-primary { background: #3d7ea6; border-bottom-color: #1f4b66; }
    .btn-primary:hover { background: #4a90bb; }
    .btn-connect { background: #6c7a89; border-bottom-color: #3d4a57; }
    .btn-connect:hover { background: #7e8d9e; }
    .btn-connect.connected { background: #2d8f5c; border-bottom-color: #1a5a38; }
    .btn-camera { background: #7c5c9e; border-bottom-color: #4d3468; }
    .btn-camera:hover { background: #9470b8; }
    .btn-camera.active { background: #e74c3c; border-bottom-color: #a93226; }

    .status-label {
      margin-top: 1rem;
      color: #b8d0e0;
      font-weight: 400;
      font-size: 0.9rem;
      background: #1d2a34;
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      border: 1px solid #405a6b;
      display: inline-block;
      backdrop-filter: blur(2px);
      letter-spacing: 0.4px;
    }

    .timing-badge {
      font-size: 0.75rem;
      background: #1f2f3b;
      padding: 0.2rem 0.9rem;
      border-radius: 30px;
      color: #b0c8d8;
      border: 1px solid #3b5567;
      margin-top: 0.3rem;
    }

    .serial-status {
      font-size: 0.75rem;
      color: #8aa3b5;
      margin-top: 0.3rem;
      padding: 0.2rem 0.9rem;
      border-radius: 30px;
      background: #1a2630;
      border: 1px solid #2d4050;
    }

    /* ----- right column : camera sensor ----- */
    .right-col {
      flex: 1 1 55%;
      min-width: 280px;
      background: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      border-left: 1px solid #2a3d4d;
    }

    #cameraFeed {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      background: #000;
    }

    #cameraFeed.active {
      display: block;
    }

    .camera-placeholder {
      color: #4a5a6a;
      font-size: 1.2rem;
      text-align: center;
      padding: 2rem;
      letter-spacing: 1px;
    }

    .camera-placeholder .icon {
      font-size: 4rem;
      display: block;
      margin-bottom: 1rem;
      opacity: 0.3;
    }

    .camera-controls {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 1rem;
      z-index: 10;
    }

    .camera-status {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(0, 0, 0, 0.7);
      color: #4ade80;
      padding: 0.3rem 1rem;
      border-radius: 20px;
      font-size: 0.75rem;
      border: 1px solid rgba(74, 222, 128, 0.3);
      z-index: 10;
      display: none;
    }

    .camera-status.active {
      display: block;
    }

    /* responsive */
    @media (max-width: 750px) {
      .dashboard {
        flex-direction: column;
        height: auto;
        max-height: none;
        border-radius: 2rem;
      }
      .left-col {
        border-right: none;
        border-bottom: 2px solid #2d4050;
        padding: 2rem 1rem;
      }
      .right-col {
        min-height: 400px;
        border-left: none;
        border-top: 2px solid #2d4050;
      }
      .light {
        width: 80px;
        height: 80px;
      }
      .traffic-light { gap: 1.2rem; padding: 1.5rem; }
      .traffic-wrapper { padding: 1.5rem; }
    }

    @media (max-width: 480px) {
      .light { width: 70px; height: 70px; }
      .btn { padding: 0.5rem 0.8rem; font-size: 0.8rem; }
    }
  </style>
    </head>
    <body>

        <div class="dashboard">
            <!-- LEFT COLUMN: Traffic light -->
            <div class="left-col">
                <div class="traffic-wrapper">
                    <div class="traffic-light" id="trafficLight">
                        <div class="light red-light" id="redLight"></div>
                        <div class="light yellow-light" id="yellowLight"></div>
                        <div class="light green-light" id="greenLight"></div>
                    </div>
                    <div class="pole"></div>
                    <div class="base"></div>
                </div>

                <!-- controls -->
                <div class="controls">
                    <button class="btn btn-connect" id="connectBtn">🔌
                        Connect</button>
                    <button class="btn btn-danger" id="redBtn">🔴 Red</button>
                    <button class="btn btn-warning" id="yellowBtn">🟡
                        Yellow</button>
                    <button class="btn btn-success" id="greenBtn">🟢
                        Green</button>
                    <button class="btn btn-primary" id="autoBtn">▶ Auto</button>
                </div>

                <div class="status-label" id="statusMessage">⏸ idle · all
                    off</div>
                <div class="serial-status" id="serialStatus">⚡ Serial:
                    Disconnected</div>
                <div class="timing-badge">🔴 3s · 🟢 5s · 🟡 1s</div>
            </div>

            <!-- RIGHT COLUMN: Camera sensor -->
            <div class="right-col" id="cameraSensor">
                <video id="cameraFeed" autoplay playsinline></video>

                <div class="camera-placeholder" id="cameraPlaceholder">
                    <span class="icon">📷</span>
                    Camera Off<br>
                    <span style="font-size: 0.8rem; opacity: 0.6;">Click
                        "Start Camera" below</span>
                </div>

                <div class="camera-status" id="cameraStatus">🟢 Camera
                    Active</div>

                <div class="camera-controls">
                    <button class="btn btn-camera" id="cameraBtn">📷 Start
                        Camera</button>
                </div>
            </div>
        </div>

        <script>
  (function() {
    "use strict";

    // DOM refs (traffic light)
    const red = document.getElementById('redLight');
    const yellow = document.getElementById('yellowLight');
    const green = document.getElementById('greenLight');
    const statusMsg = document.getElementById('statusMessage');
    const serialStatus = document.getElementById('serialStatus');

    const connectBtn = document.getElementById('connectBtn');
    const redBtn = document.getElementById('redBtn');
    const yellowBtn = document.getElementById('yellowBtn');
    const greenBtn = document.getElementById('greenBtn');
    const autoBtn = document.getElementById('autoBtn');

    // Camera refs
    const cameraFeed = document.getElementById('cameraFeed');
    const cameraPlaceholder = document.getElementById('cameraPlaceholder');
    const cameraStatus = document.getElementById('cameraStatus');
    const cameraBtn = document.getElementById('cameraBtn');

    let cameraStream = null;
    let cameraActive = false;

    // timing constants (ms)
    const RED_TIME = 3000;
    const GREEN_TIME = 5000;
    const YELLOW_TIME = 1000;

    // state
    let activeLight = null;
    let autoActive = false;
    let timeoutId = null;
    let serialPort = null;
    let serialWriter = null;
    let serialReader = null;
    let isConnected = false;

    // ---- Camera Functions ----
    async function startCamera() {
      try {
        // Request camera access
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: 'environment',
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        cameraStream = stream;
        cameraFeed.srcObject = stream;
        cameraFeed.classList.add('active');
        cameraPlaceholder.style.display = 'none';
        cameraStatus.classList.add('active');
        cameraActive = true;
        cameraBtn.textContent = '⏹ Stop Camera';
        cameraBtn.classList.add('active');

        console.log('Camera started successfully');
      } catch (error) {
        console.error('Camera error:', error);
        alert('Unable to access camera. Please ensure you have granted camera permissions.');
        cameraPlaceholder.innerHTML = `
          <span class="icon">🚫</span>
          Camera Access Denied<br>
          <span style="font-size: 0.8rem; opacity: 0.6;">Please allow camera permissions</span>
        `;
        cameraPlaceholder.style.display = 'block';
      }
    }

    function stopCamera() {
      if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
      }
      cameraFeed.srcObject = null;
      cameraFeed.classList.remove('active');
      cameraPlaceholder.style.display = 'block';
      cameraPlaceholder.innerHTML = `
        <span class="icon">📷</span>
        Camera Off<br>
        <span style="font-size: 0.8rem; opacity: 0.6;">Click "Start Camera" below</span>
      `;
      cameraStatus.classList.remove('active');
      cameraActive = false;
      cameraBtn.textContent = '📷 Start Camera';
      cameraBtn.classList.remove('active');
      console.log('Camera stopped');
    }

    function toggleCamera() {
      if (cameraActive) {
        stopCamera();
      } else {
        startCamera();
      }
    }

    // ---- Serial Functions ----
    async function sendSerialCommand(command) {
      if (!isConnected || !serialWriter) {
        console.warn('Serial not connected');
        return false;
      }
      try {
        const encoder = new TextEncoder();
        const data = encoder.encode(command + '\n');
        await serialWriter.write(data);
        console.log(`Sent: ${command}`);
        return true;
      } catch (error) {
        console.error('Serial write error:', error);
        return false;
      }
    }

    // ---- Traffic Light Functions ----
    function clearLights() {
      red.classList.remove('active');
      yellow.classList.remove('active');
      green.classList.remove('active');
    }

    function clearPendingTimeout() {
      if (timeoutId) {
        clearTimeout(timeoutId);
        timeoutId = null;
      }
    }

    function stopAuto() {
      autoActive = false;
      clearPendingTimeout();
      autoBtn.textContent = '▶ Auto';
    }

    function setLight(color) {
      stopAuto();
      clearPendingTimeout();
      clearLights();

      let command = '';
      if (color === 'red') {
        red.classList.add('active');
        activeLight = 'red';
        statusMsg.textContent = '🔴 Red · stop (3s)';
        command = 'R';
      } else if (color === 'yellow') {
        yellow.classList.add('active');
        activeLight = 'yellow';
        statusMsg.textContent = '🟡 Yellow · caution (1s)';
        command = 'Y';
      } else if (color === 'green') {
        green.classList.add('active');
        activeLight = 'green';
        statusMsg.textContent = '🟢 Green · go (5s)';
        command = 'G';
      } else {
        activeLight = null;
        statusMsg.textContent = '⏸ idle · all off';
        command = 'O';
      }

      if (command) {
        sendSerialCommand(command);
      }
    }

    function startAuto() {
      stopAuto();
      clearPendingTimeout();
      clearLights();
      activeLight = null;

      sendSerialCommand('A');

      function scheduleNext(stateIndex) {
        let duration, color, displayText;
        if (stateIndex === 0) {
          color = 'red';
          duration = RED_TIME;
          displayText = '🔴 Red · stop (3s)';
        } else if (stateIndex === 1) {
          color = 'green';
          duration = GREEN_TIME;
          displayText = '🟢 Green · go (5s)';
        } else {
          color = 'yellow';
          duration = YELLOW_TIME;
          displayText = '🟡 Yellow · caution (1s)';
        }

        clearLights();
        if (color === 'red') red.classList.add('active');
        else if (color === 'green') green.classList.add('active');
        else if (color === 'yellow') yellow.classList.add('active');
        activeLight = color;
        statusMsg.textContent = displayText;

        let nextIndex;
        if (stateIndex === 0) nextIndex = 1;
        else if (stateIndex === 1) nextIndex = 2;
        else nextIndex = 0;

        timeoutId = setTimeout(() => {
          if (!autoActive) return;
          scheduleNext(nextIndex);
        }, duration);
      }

      autoActive = true;
      autoBtn.textContent = '⏹ Stop';
      scheduleNext(0);
    }

    function resetAll() {
      stopAuto();
      clearPendingTimeout();
      clearLights();
      activeLight = null;
      statusMsg.textContent = '⏸ idle · all off';
      autoBtn.textContent = '▶ Auto';
      sendSerialCommand('O');
    }

    // ---- Serial Connection ----
    async function connectSerial() {
      try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 9600 });

        serialPort = port;
        isConnected = true;

        const writer = port.writable.getWriter();
        serialWriter = writer;

        const reader = port.readable.getReader();
        serialReader = reader;
        readSerialData(reader);

        connectBtn.textContent = '✅ Connected';
        connectBtn.classList.add('connected');
        serialStatus.textContent = '✅ Serial: Connected';
        serialStatus.style.color = '#4ade80';

        console.log('Serial connected successfully');
      } catch (error) {
        console.error('Serial connection error:', error);
        serialStatus.textContent = '❌ Serial: Connection failed';
        serialStatus.style.color = '#f87171';
      }
    }

    async function readSerialData(reader) {
      try {
        const decoder = new TextDecoder();
        while (true) {
          const { value, done } = await reader.read();
          if (done) {
            console.log('Serial reader done');
            break;
          }
          const message = decoder.decode(value);
          console.log('Arduino:', message);
        }
      } catch (error) {
        console.error('Serial read error:', error);
      } finally {
        reader.releaseLock();
      }
    }

    async function disconnectSerial() {
      try {
        if (serialWriter) {
          await serialWriter.close();
          serialWriter = null;
        }
        if (serialReader) {
          await serialReader.cancel();
          serialReader = null;
        }
        if (serialPort) {
          await serialPort.close();
          serialPort = null;
        }
        isConnected = false;
        connectBtn.textContent = '🔌 Connect';
        connectBtn.classList.remove('connected');
        serialStatus.textContent = '⚡ Serial: Disconnected';
        serialStatus.style.color = '#8aa3b5';
        console.log('Serial disconnected');
      } catch (error) {
        console.error('Disconnect error:', error);
      }
    }

    function toggleSerial() {
      if (isConnected) {
        disconnectSerial();
      } else {
        if ('serial' in navigator) {
          connectSerial();
        } else {
          alert('Web Serial API is not supported in this browser.\nPlease use Chrome, Edge, or Opera.');
          serialStatus.textContent = '❌ Serial: Not supported';
          serialStatus.style.color = '#f87171';
        }
      }
    }

    // ---- Event Handlers ----
    function handleRed() { 
      if (autoActive) stopAuto(); 
      setLight('red'); 
    }
    function handleYellow() { 
      if (autoActive) stopAuto(); 
      setLight('yellow'); 
    }
    function handleGreen() { 
      if (autoActive) stopAuto(); 
      setLight('green'); 
    }
    function handleAuto() {
      if (autoActive) {
        resetAll();
        sendSerialCommand('S');
      } else {
        startAuto();
      }
    }

    // ---- Event Listeners ----
    connectBtn.addEventListener('click', toggleSerial);
    redBtn.addEventListener('click', handleRed);
    yellowBtn.addEventListener('click', handleYellow);
    greenBtn.addEventListener('click', handleGreen);
    autoBtn.addEventListener('click', handleAuto);
    cameraBtn.addEventListener('click', toggleCamera);

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'r' || e.key === 'R') { e.preventDefault(); handleRed(); }
      else if (e.key === 'y' || e.key === 'Y') { e.preventDefault(); handleYellow(); }
      else if (e.key === 'g' || e.key === 'G') { e.preventDefault(); handleGreen(); }
      else if (e.key === 'a' || e.key === 'A') { e.preventDefault(); handleAuto(); }
      else if (e.key === 'Escape') { e.preventDefault(); resetAll(); }
      else if (e.key === 'c' || e.key === 'C') { e.preventDefault(); toggleCamera(); }
    });

    // ---- Init ----
    clearLights();
    statusMsg.textContent = '⏸ idle · all off';
    autoBtn.textContent = '▶ Auto';

    console.log('🚦 Traffic light with Camera and Serial control');
    console.log('Click "Connect" to connect to Arduino');
    console.log('Click "Start Camera" to enable camera feed');
    console.log('Timings: Red 3s, Green 5s, Yellow 1s');

    // Check Web Serial API support
    if (!('serial' in navigator)) {
      serialStatus.textContent = '❌ Serial: Not supported (use Chrome/Edge)';
      serialStatus.style.color = '#f87171';
      connectBtn.disabled = true;
      connectBtn.style.opacity = '0.5';
      connectBtn.title = 'Web Serial API not supported';
    }

    // Check camera support
    if (!('mediaDevices' in navigator) || !('getUserMedia' in navigator.mediaDevices)) {
      cameraBtn.disabled = true;
      cameraBtn.style.opacity = '0.5';
      cameraBtn.title = 'Camera API not supported';
      cameraPlaceholder.innerHTML = `
        <span class="icon">🚫</span>
        Camera Not Supported<br>
        <span style="font-size: 0.8rem; opacity: 0.6;">Your browser doesn't support camera access</span>
      `;
    }
  })();
</script>
    </body>
</html>
