<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Traffic Light + Camera (Arduino Controlled)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b1219;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 1.2rem;
        }

        .dashboard {
            display: flex;
            flex-wrap: wrap;
            width: 1300px;
            max-width: 100%;
            height: 700px;
            max-height: 90vh;
            background: #141f2a;
            border-radius: 3rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            overflow: hidden;
        }

        .left-col {
            flex: 1 1 45%;
            min-width: 300px;
            background: linear-gradient(145deg, #1f2e3b 0%, #15222d 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem 1.2rem;
            border-right: 2px solid #2d4050;
            position: relative;
            gap: 0.5rem;
        }

        .traffic-wrapper {
            background: #283b4a;
            padding: 1.8rem 2rem 2rem 2rem;
            border-radius: 5rem 5rem 3rem 3rem;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.7), inset 0 -4px 8px rgba(0, 0, 0, 0.5), inset 0 4px 6px rgba(255, 255, 255, 0.06);
            border-bottom: 6px solid #1b2a33;
            width: fit-content;
            margin: 0 auto;
        }

        .traffic-light {
            background: #1b2630;
            padding: 1.8rem 1.5rem 1.5rem 1.5rem;
            border-radius: 4.5rem 4.5rem 3rem 3rem;
            box-shadow: inset 0 -8px 10px rgba(0, 0, 0, 0.7), inset 0 8px 12px rgba(255, 255, 255, 0.04);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
            min-width: 110px;
            border-top: 2px solid #3f5567;
        }

        .light {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: #1f2b33;
            box-shadow: inset 0 -8px 6px rgba(0, 0, 0, 0.6), inset 0 8px 8px rgba(255, 255, 255, 0.08), 0 0 0 2px #1b232b;
            transition: background 0.2s ease, box-shadow 0.25s ease;
        }

        .red-light {
            background: #4a1f1f;
        }
        .red-light.active {
            background: #ff2d2d;
            box-shadow: inset 0 -6px 6px rgba(0, 0, 0, 0.4), inset 0 6px 20px #ff9a9a, 0 0 30px 12px rgba(255, 50, 50, 0.6);
        }
        .yellow-light {
            background: #5a4a1a;
        }
        .yellow-light.active {
            background: #ffe033;
            box-shadow: inset 0 -6px 6px rgba(0, 0, 0, 0.4), inset 0 6px 20px #ffefb0, 0 0 30px 12px rgba(255, 215, 0, 0.6);
        }
        .green-light {
            background: #1a4a2a;
        }
        .green-light.active {
            background: #2bdb5c;
            box-shadow: inset 0 -6px 6px rgba(0, 0, 0, 0.4), inset 0 6px 20px #9affb0, 0 0 30px 12px rgba(50, 255, 100, 0.6);
        }

        .pole {
            width: 16px;
            height: 50px;
            background: #333f4b;
            margin: 0 auto -6px auto;
            border-radius: 0 0 20px 20px;
            box-shadow: inset -4px 0 8px rgba(0, 0, 0, 0.4);
            border-left: 1px solid #4e5f6b;
            border-right: 1px solid #1f2933;
        }
        .base {
            width: 60px;
            height: 10px;
            background: #2c3a44;
            margin: 0 auto;
            border-radius: 30px;
            box-shadow: inset 0 4px 6px rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid #1b242c;
        }

        /* ========== CONTROLS - ONLY CONNECT BUTTON ========== */
        .controls {
            display: flex;
            justify-content: center;
            margin-top: 0.8rem;
            width: 100%;
        }

        .btn {
            background: #334654;
            border: none;
            border-bottom: 4px solid #1c2933;
            padding: 0.7rem 2.5rem;
            border-radius: 3rem;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.6px;
            color: #eaf0f5;
            cursor: pointer;
            box-shadow: 0 5px 0 #141d24, 0 6px 12px rgba(0, 0, 0, 0.3);
            transition: all 0.07s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0 #141d24, 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        .btn-connect {
            background: #6c7a89;
            border-bottom-color: #3d4a57;
            min-width: 180px;
            justify-content: center;
        }
        .btn-connect:hover {
            background: #7e8d9e;
        }
        .btn-connect.connected {
            background: #2d8f5c;
            border-bottom-color: #1a5a38;
        }

        .status-label {
            margin-top: 0.8rem;
            color: #b8d0e0;
            font-weight: 500;
            font-size: 1rem;
            background: #1d2a34;
            padding: 0.4rem 1.5rem;
            border-radius: 40px;
            border: 1px solid #405a6b;
            display: inline-block;
            backdrop-filter: blur(2px);
            letter-spacing: 0.4px;
            min-width: 160px;
            text-align: center;
        }

        .timing-badge {
            font-size: 0.75rem;
            background: #1f2f3b;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            color: #b0c8d8;
            border: 1px solid #3b5567;
            margin-top: 0.3rem;
        }

        .serial-status {
            font-size: 0.75rem;
            color: #8aa3b5;
            margin-top: 0.3rem;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            background: #1a2630;
            border: 1px solid #2d4050;
            font-weight: 500;
        }

        /* ========== CAMERA SECTION ========== */
        .right-col {
            flex: 1 1 55%;
            min-width: 280px;
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-left: 1px solid #2a3d4d;
        }

        #cameraFeed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            background: #000;
        }
        #cameraFeed.active {
            display: block;
        }

        .camera-placeholder {
            color: #4a5a6a;
            font-size: 1.2rem;
            text-align: center;
            padding: 2rem;
            letter-spacing: 1px;
        }
        .camera-placeholder .icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 1rem;
            opacity: 0.3;
        }

        .camera-status {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(0, 0, 0, 0.85);
            color: #4ade80;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            font-size: 0.8rem;
            border: 1px solid rgba(74, 222, 128, 0.4);
            z-index: 15;
            display: none;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }
        .camera-status.active {
            display: block;
        }

        .camera-indicator {
            position: absolute;
            top: 1rem;
            left: 1rem;
            z-index: 15;
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.85);
            padding: 0.5rem 1.2rem 0.5rem 0.8rem;
            border-radius: 30px;
            border: 1px solid rgba(74, 222, 128, 0.3);
            backdrop-filter: blur(10px);
        }
        .camera-indicator.active {
            display: flex;
        }
        .camera-indicator .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ef4444;
            animation: blink-dot 1s ease-in-out infinite;
        }
        @keyframes blink-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.2;
                transform: scale(0.8);
            }
        }
        .camera-indicator .label {
            color: #ffffff;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* ========== CAMERA BUTTON - MOVED UP ========== */
        .camera-btn-wrapper {
            position: absolute;
            bottom: 6.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            width: 90%;
            max-width: 350px;
        }

        .btn-camera {
            width: 100%;
            background: linear-gradient(145deg, #8b5cf6, #6d28d9);
            border: 2px solid #a78bfa;
            border-bottom: 6px solid #4c1d95;
            padding: 1.2rem 2rem;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: #ffffff;
            box-shadow: 0 8px 0 #4c1d95, 0 10px 30px rgba(139, 92, 246, 0.4);
            transition: all 0.1s ease;
            border-radius: 60px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-camera:hover {
            transform: translateY(-3px);
            background: linear-gradient(145deg, #9d71f8, #7c3aed);
            box-shadow: 0 10px 0 #4c1d95, 0 15px 40px rgba(139, 92, 246, 0.5);
        }

        .btn-camera:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #4c1d95, 0 10px 30px rgba(139, 92, 246, 0.3);
        }

        .btn-camera.active {
            background: linear-gradient(145deg, #ef4444, #dc2626);
            border-color: #fca5a5;
            border-bottom-color: #991b1b;
            box-shadow: 0 8px 0 #991b1b, 0 10px 30px rgba(239, 68, 68, 0.4);
            animation: pulse-camera 1.5s ease-in-out infinite;
        }

        .btn-camera.active:hover {
            background: linear-gradient(145deg, #f87171, #ef4444);
        }

        @keyframes pulse-camera {
            0%,
            100% {
                box-shadow: 0 8px 0 #991b1b, 0 10px 30px rgba(239, 68, 68, 0.4);
            }
            50% {
                box-shadow: 0 8px 0 #991b1b, 0 10px 60px rgba(239, 68, 68, 0.7);
            }
        }

        .camera-icon {
            font-size: 1.8rem;
        }

        @media (max-width: 750px) {
            .dashboard {
                flex-direction: column;
                height: auto;
                max-height: none;
                border-radius: 2rem;
            }
            .left-col {
                border-right: none;
                border-bottom: 2px solid #2d4050;
                padding: 1.5rem 1rem;
            }
            .right-col {
                min-height: 400px;
                border-left: none;
                border-top: 2px solid #2d4050;
            }
            .light {
                width: 75px;
                height: 75px;
            }
            .traffic-light {
                gap: 1rem;
                padding: 1.2rem;
            }
            .traffic-wrapper {
                padding: 1.2rem 1.5rem 1.5rem 1.5rem;
            }
            .btn-camera {
                padding: 1rem 1.5rem;
                font-size: 1.2rem;
            }
            .camera-btn-wrapper {
                bottom: 2.5rem;
                width: 85%;
            }
            .btn {
                padding: 0.6rem 1.8rem;
                font-size: 1rem;
                min-width: 150px;
            }
            .status-label {
                font-size: 0.9rem;
                padding: 0.3rem 1.2rem;
                min-width: 140px;
            }
        }
        @media (max-width: 480px) {
            .light {
                width: 65px;
                height: 65px;
            }
            .btn-camera {
                padding: 0.8rem 1rem;
                font-size: 1rem;
            }
            .camera-btn-wrapper {
                bottom: 2rem;
                width: 90%;
            }
            .btn {
                padding: 0.5rem 1.2rem;
                font-size: 0.9rem;
                min-width: 130px;
            }
            .status-label {
                font-size: 0.8rem;
                padding: 0.3rem 1rem;
                min-width: 120px;
            }
            .traffic-light {
                padding: 1rem;
                gap: 0.8rem;
                min-width: 90px;
            }
            .traffic-wrapper {
                padding: 1rem 1.2rem 1.2rem 1.2rem;
            }
            .pole {
                height: 35px;
            }
        }
    </style>
  </head>
  <body>

    <div class="dashboard">
      <!-- ========== LEFT COLUMN: TRAFFIC LIGHT ========== -->
      <div class="left-col">
        <div class="traffic-wrapper">
          <div class="traffic-light" id="trafficLight">
            <div class="light red-light" id="redLight"></div>
            <div class="light yellow-light" id="yellowLight"></div>
            <div class="light green-light" id="greenLight"></div>
          </div>
          <div class="pole"></div>
          <div class="base"></div>
        </div>

        <!-- ONLY CONNECT BUTTON - ALL OTHERS REMOVED -->
        <div class="controls">
          <button class="btn btn-connect" id="connectBtn">🔌 Connect</button>
        </div>

        <div class="status-label" id="statusMessage">⏸ Waiting for
          Arduino...</div>
        <div class="serial-status" id="serialStatus">⚡ Serial:
          Disconnected</div>
        <div class="timing-badge">Arduino controls timing</div>
      </div>

      <!-- ========== RIGHT COLUMN: CAMERA ========== -->
      <div class="right-col" id="cameraSensor">
        <video id="cameraFeed" autoplay playsinline></video>
        <div class="camera-placeholder" id="cameraPlaceholder">
          <span class="icon">📷</span>
          Camera Off<br />
          <span style="font-size: 0.8rem; opacity: 0.6;">Click the big purple
            button below</span>
        </div>
        <div class="camera-status" id="cameraStatus">🟢 Camera Active</div>

        <div class="camera-indicator" id="cameraIndicator">
          <span class="dot"></span>
          <span class="label">REC</span>
        </div>

        <div class="camera-btn-wrapper">
          <button class="btn-camera" id="cameraBtn">
            <span class="camera-icon">📷</span>
            <span id="cameraBtnText">Start Camera</span>
          </button>
        </div>
      </div>
    </div>

    <script>
        (function() {
            "use strict";

            // DOM refs - Traffic Light
            const red = document.getElementById('redLight');
            const yellow = document.getElementById('yellowLight');
            const green = document.getElementById('greenLight');
            const statusMsg = document.getElementById('statusMessage');
            const serialStatus = document.getElementById('serialStatus');
            const connectBtn = document.getElementById('connectBtn');

            // Camera refs
            const cameraFeed = document.getElementById('cameraFeed');
            const cameraPlaceholder = document.getElementById('cameraPlaceholder');
            const cameraStatus = document.getElementById('cameraStatus');
            const cameraBtn = document.getElementById('cameraBtn');
            const cameraBtnText = document.getElementById('cameraBtnText');
            const cameraIndicator = document.getElementById('cameraIndicator');

            let cameraStream = null;
            let cameraActive = false;

            // Serial state
            let serialPort = null;
            let serialWriter = null;
            let serialReader = null;
            let isConnected = false;

            // ---- Camera Functions ----
            async function startCamera() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
                        audio: false
                    });
                    cameraStream = stream;
                    cameraFeed.srcObject = stream;
                    cameraFeed.classList.add('active');
                    cameraPlaceholder.style.display = 'none';
                    cameraStatus.classList.add('active');
                    cameraIndicator.classList.add('active');
                    cameraActive = true;
                    cameraBtnText.textContent = 'Stop Camera';
                    cameraBtn.classList.add('active');
                    console.log('📷 Camera started');
                } catch (error) {
                    console.error('Camera error:', error);
                    alert('Unable to access camera. Please grant camera permissions.');
                    cameraPlaceholder.innerHTML = `
                        <span class="icon">🚫</span>
                        Camera Access Denied<br />
                        <span style="font-size: 0.8rem; opacity: 0.6;">Please allow camera permissions</span>
                    `;
                    cameraPlaceholder.style.display = 'block';
                }
            }

            function stopCamera() {
                if (cameraStream) {
                    cameraStream.getTracks().forEach(track => track.stop());
                    cameraStream = null;
                }
                cameraFeed.srcObject = null;
                cameraFeed.classList.remove('active');
                cameraPlaceholder.style.display = 'block';
                cameraPlaceholder.innerHTML = `
                    <span class="icon">📷</span>
                    Camera Off<br />
                    <span style="font-size: 0.8rem; opacity: 0.6;">Click the big purple button below</span>
                `;
                cameraStatus.classList.remove('active');
                cameraIndicator.classList.remove('active');
                cameraActive = false;
                cameraBtnText.textContent = 'Start Camera';
                cameraBtn.classList.remove('active');
                console.log('📷 Camera stopped');
            }

            function toggleCamera() {
                if (cameraActive) {
                    stopCamera();
                } else {
                    startCamera();
                }
            }

            // ---- Traffic Light Functions (Arduino controls everything) ----
            function clearLights() {
                red.classList.remove('active');
                yellow.classList.remove('active');
                green.classList.remove('active');
            }

            // Called when Arduino sends status updates
            function handleArduinoStatus(statusLine) {
                const parts = statusLine.split(':');
                const state = parts[1]?.trim() || '';

                console.log('📟 Arduino status:', state);

                clearLights();

                switch (state) {
                    case 'RED':
                        red.classList.add('active');
                        statusMsg.textContent = '🔴 Red · STOP';
                        break;
                    case 'YELLOW':
                        yellow.classList.add('active');
                        statusMsg.textContent = '🟡 Yellow · CAUTION';
                        break;
                    case 'GREEN':
                        green.classList.add('active');
                        statusMsg.textContent = '🟢 Green · GO';
                        break;
                    case 'IDLE':
                        statusMsg.textContent = '⏸ Idle · All Off';
                        break;
                    default:
                        if (state.startsWith('AUTO')) {
                            statusMsg.textContent = '🔄 Auto Mode Running';
                        } else if (state.length > 0) {
                            statusMsg.textContent = `📟 ${state}`;
                        }
                        break;
                }
            }

            // ---- Serial Data Reader ----
            async function readSerialData(reader) {
                try {
                    const decoder = new TextDecoder();
                    let buffer = '';

                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) break;

                        buffer += decoder.decode(value);

                        let lines = buffer.split('\n');
                        buffer = lines.pop();

                        for (let line of lines) {
                            line = line.trim();
                            if (line.startsWith('STATUS:')) {
                                handleArduinoStatus(line);
                            } else if (line.length > 0) {
                                console.log('📟 Arduino:', line);
                            }
                        }
                    }
                } catch (error) {
                    console.error('Serial read error:', error);
                } finally {
                    reader.releaseLock();
                }
            }

            // ---- Serial Connection ----
            async function connectSerial() {
                try {
                    const port = await navigator.serial.requestPort();
                    await port.open({ baudRate: 9600 });

                    serialPort = port;
                    isConnected = true;

                    const writer = port.writable.getWriter();
                    serialWriter = writer;

                    const reader = port.readable.getReader();
                    serialReader = reader;
                    readSerialData(reader);

                    connectBtn.textContent = '✅ Connected';
                    connectBtn.classList.add('connected');
                    serialStatus.textContent = '✅ Serial: Connected';
                    serialStatus.style.color = '#4ade80';

                    console.log('✅ Serial connected successfully');
                } catch (error) {
                    console.error('Serial connection error:', error);
                    serialStatus.textContent = '❌ Serial: Connection failed';
                    serialStatus.style.color = '#f87171';
                }
            }

            async function disconnectSerial() {
                try {
                    if (serialWriter) {
                        await serialWriter.close();
                        serialWriter = null;
                    }
                    if (serialReader) {
                        await serialReader.cancel();
                        serialReader = null;
                    }
                    if (serialPort) {
                        await serialPort.close();
                        serialPort = null;
                    }
                    isConnected = false;
                    connectBtn.textContent = '🔌 Connect';
                    connectBtn.classList.remove('connected');
                    serialStatus.textContent = '⚡ Serial: Disconnected';
                    serialStatus.style.color = '#8aa3b5';
                    clearLights();
                    statusMsg.textContent = '⏸ Waiting for Arduino...';
                    console.log('🔌 Serial disconnected');
                } catch (error) {
                    console.error('Disconnect error:', error);
                }
            }

            function toggleSerial() {
                if (isConnected) {
                    disconnectSerial();
                } else {
                    if ('serial' in navigator) {
                        connectSerial();
                    } else {
                        alert('Web Serial API is not supported in this browser.\nPlease use Chrome, Edge, or Opera.');
                        serialStatus.textContent = '❌ Serial: Not supported';
                        serialStatus.style.color = '#f87171';
                    }
                }
            }

            // ---- Event Listeners ----
            connectBtn.addEventListener('click', toggleSerial);
            cameraBtn.addEventListener('click', toggleCamera);

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'c' || e.key === 'C') {
                    e.preventDefault();
                    toggleCamera();
                }
                if (e.key === 'Escape') {
                    e.preventDefault();
                    if (isConnected && serialWriter) {
                        try {
                            const encoder = new TextEncoder();
                            serialWriter.write(encoder.encode('O\n'));
                            console.log('Sent: O (off)');
                        } catch (err) {
                            console.error('Error sending off command:', err);
                        }
                    }
                }
            });

            // ---- Init ----
            clearLights();
            statusMsg.textContent = '⏸ Waiting for Arduino...';
            connectBtn.textContent = '🔌 Connect';

            console.log('🚦 Traffic Light + Camera Dashboard');
            console.log('📟 Arduino sends data → Browser displays');
            console.log('🎯 Press C to toggle camera');

            // Check Web Serial API support
            if (!('serial' in navigator)) {
                serialStatus.textContent = '❌ Serial: Not supported (use Chrome/Edge)';
                serialStatus.style.color = '#f87171';
                connectBtn.disabled = true;
                connectBtn.style.opacity = '0.5';
                connectBtn.title = 'Web Serial API not supported';
            }

            // Check camera support
            if (!('mediaDevices' in navigator) || !('getUserMedia' in navigator.mediaDevices)) {
                cameraBtn.disabled = true;
                cameraBtn.style.opacity = '0.5';
                cameraBtn.title = 'Camera API not supported';
                cameraPlaceholder.innerHTML = `
                    <span class="icon">🚫</span>
                    Camera Not Supported<br />
                    <span style="font-size: 0.8rem; opacity: 0.6;">Your browser doesn't support camera access</span>
                `;
            }
        })();
    </script>

  </body>
</html>
